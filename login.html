<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Admin de Templates</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f172a;
      --surface:  rgba(30, 41, 59, 0.6);
      --border:   rgba(255, 255, 255, 0.15);
      --text:     #f8fafc;
      --muted:    #cbd5e1;
      --accent:   #3b82f6;
      --error-bg: rgba(232, 84, 68, 0.08);
      --error:    #E85444;
    }

    html {
      min-height: 100%;
      background-color: var(--bg);
      background-image:
        radial-gradient(circle at 50% 0%,
          rgba(56, 189, 248, 0.1) 0%,
          rgba(6, 182, 212, 0.05) 40%,
          rgba(0, 0, 0, 0) 80%),
        linear-gradient(to bottom, #0f172a, #020617);
      background-attachment: fixed;
    }

    body {
      min-height: 100vh;
      color: var(--text);
      font-family: 'Outfit', sans-serif;
    }


    /* Accent line top */
    body::after {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: var(--accent);
      z-index: 10;
    }

    .login-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      z-index: 1;
    }

    .login-card {
      width: 100%;
      max-width: 400px;
      background: var(--surface);
      border: 1px solid var(--border);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 52px 44px 44px;
    }

    /* Brand section */
    .card-brand {
      margin-bottom: 44px;
    }

    .brand-eyebrow {
      display: block;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
    }

    .brand-title {
      font-family: 'Outfit', sans-serif;
      font-size: 46px;
      line-height: 1.05;
      color: var(--text);
      margin-bottom: 18px;
    }

    .brand-title em {
      color: var(--accent);
      font-style: italic;
    }

    .brand-rule {
      width: 36px;
      height: 2px;
      background: var(--accent);
    }

    /* Form fields */
    .form-group {
      margin-bottom: 30px;
    }

    .form-group label {
      display: block;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .form-group input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border);
      color: var(--text);
      padding: 10px 0 10px 12px;
      font-size: 15px;
      font-family: 'Outfit', sans-serif;
      outline: none;
      transition: border-color 0.2s ease;
    }

    .form-group input::placeholder { color: rgba(203, 213, 225, 0.3); }
    .form-group input:focus { border-bottom-color: var(--accent); }

    /* Error */
    .error-message {
      font-size: 13px;
      color: var(--error);
      background: var(--error-bg);
      border-left: 2px solid var(--error);
      padding: 10px 14px;
      margin-bottom: 22px;
      line-height: 1.5;
    }

    /* Submit button — fill from left on hover */
    .btn-submit {
      position: relative;
      overflow: hidden;
      background: var(--accent);
      color: #ffffff;
      border: none;
      width: 100%;
      padding: 17px 24px;
      font-family: 'Outfit', sans-serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: color 0.35s ease;
      margin-top: 6px;
    }

    .btn-submit::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      height: 100%; width: 0;
      background: #0f172a;
      transition: width 0.42s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 0;
    }

    .btn-submit:not(:disabled):hover::before { width: 100%; }
    .btn-submit:not(:disabled):hover { color: var(--accent); }

    .btn-submit:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .btn-label, .btn-icon {
      position: relative;
      z-index: 1;
    }

    .btn-icon {
      font-size: 18px;
      transition: transform 0.3s ease;
    }

    .btn-submit:not(:disabled):hover .btn-icon {
      transform: translateX(4px);
    }

    .btn-back {
      position: fixed;
      top: 24px;
      left: 24px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.5px;
      transition: color 0.2s ease, gap 0.2s ease;
      z-index: 10;
    }

    .btn-back:hover {
      color: var(--text);
      gap: 12px;
    }

    .btn-back span {
      font-size: 16px;
      transition: transform 0.2s ease;
    }

    .btn-back:hover span {
      transform: translateX(-4px);
    }
  </style>
</head>
<body>

  <a href="index.html" class="btn-back">
    <span>←</span> Voltar
  </a>

  <main class="login-wrapper">
    <div class="login-card">

      <div class="card-brand">
        <span class="brand-eyebrow">Email Marketing</span>
        <h1 class="brand-title">Painel<br><em>Admin</em></h1>
        <div class="brand-rule"></div>
      </div>

      <form id="login-form" onsubmit="handleLogin(event)" novalidate>
        <div class="form-group">
          <label for="email">E-mail</label>
          <input type="email" id="email" required autocomplete="email" placeholder="seu@email.com">
        </div>

        <div class="form-group">
          <label for="password">Senha</label>
          <input type="password" id="password" required autocomplete="current-password" placeholder="••••••••">
        </div>

        <div id="error-msg" class="error-message" hidden></div>

        <button type="submit" id="login-btn" class="btn-submit">
          <span class="btn-label">Entrar</span>
          <span class="btn-icon">→</span>
        </button>
      </form>

    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="supabase-config.js"></script>
  <script>
    const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Redireciona se já estiver logado
    db.auth.getSession().then(({ data: { session } }) => {
      if (session) window.location.href = 'admin.html';
    });

    async function handleLogin(e) {
      e.preventDefault();

      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn      = document.getElementById('login-btn');
      const errMsg   = document.getElementById('error-msg');

      btn.disabled = true;
      btn.querySelector('.btn-label').textContent = 'Entrando...';
      errMsg.hidden = true;

      const { error } = await db.auth.signInWithPassword({ email, password });

      if (error) {
        errMsg.textContent = 'E-mail ou senha inválidos. Verifique suas credenciais.';
        errMsg.hidden = false;
        btn.disabled = false;
        btn.querySelector('.btn-label').textContent = 'Entrar';
      } else {
        window.location.href = 'admin.html';
      }
    }
  </script>

</body>
</html>
